name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # Auto-skips until ANTHROPIC_API_KEY is set in repo secrets
    # (Settings → Secrets and variables → Actions).
    if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Claude review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR for the ProductCamp conversion-analytics tool. Be concise; flag only
            real issues with file:line. Check specifically:
            - Anti-hallucination: every number traceable to raw_responses; no Date.now() in the
              report render path; no LLM calls in production report path.
            - Voronkova methodology enforced: hypothesis format {subject/action/solution/condition},
              >=3 hidden assumptions across behavior/market/tech, >=2 validation methods,
              traffic-light criteria + deadline, ICE = I*C*E (product, not mean).
            - TypeScript strict (no `any` without // FIXME), tests present, 100% coverage on changed logic.
            - No dependency added outside the fixed stack without an ADR in docs/decisions/.
            - "Заявка != оплата": application vs payment kept distinct.
